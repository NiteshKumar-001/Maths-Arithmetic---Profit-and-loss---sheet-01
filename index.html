        { q: "134. If a shopkeeper sells sugar at Rs 44.8 per kg, he is able to make a 12% profit. Due to water seepage, 1/5 of the sugar is damaged. What should now be the selling price per kg of the rest of the sugar to have a 5% profit?", exam: "(SSC CGL 2024 PRE)", options: ["Rs.49.5", "Rs.52.5", "Rs.48.5", "Rs.51.5"], correct: 1 },

        { q: "139. A clothing store sold three dresses, D1, D2 and D3, whose selling prices were in the ratio 5:6:7. They made a profit of 20% on D1, a loss of 10% on D2, and a profit of 30% on D3. What was their approximate total profit or loss percentage for the entire sale?", exam: "(SSC CGL PRE 2025)", options: ["Profit of 12.25%", "Loss of 10.98%", "Profit of 10.98%", "Loss of 12.25%"], correct: 2 }
    ];

    let currentScore = 0;
    const totalQuestions = quizData.length;
    const labels = ["A. ", "B. ", "C. ", "D. "];

    const quizListElement = document.getElementById("quiz-list");
    document.getElementById("total-score").innerText = totalQuestions;

    // Render all questions to the DOM
    quizData.forEach((data, qIndex) => {
        const card = document.createElement("div");
        card.className = "question-card";

        const questionText = document.createElement("h3");
        questionText.className = "question-text";
        
        // Append exam tag if it exists
        if (data.exam) {
            questionText.innerHTML = `${data.q} <span class="exam-tag">${data.exam}</span>`;
        } else {
            questionText.innerText = data.q;
        }
        
        card.appendChild(questionText);

        const optionsGrid = document.createElement("div");
        optionsGrid.className = "options-grid";

        const feedbackBox = document.createElement("div");
        feedbackBox.className = "feedback-box";

        data.options.forEach((optionText, oIndex) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = labels[oIndex] + optionText;

            btn.onclick = () => handleAnswer(btn, oIndex, data.correct, optionsGrid, feedbackBox, data);
            
            optionsGrid.appendChild(btn);
        });

        card.appendChild(optionsGrid);
        card.appendChild(feedbackBox);
        quizListElement.appendChild(card);
    });

    // Function to handle answer selection
    function handleAnswer(selectedBtn, selectedIndex, correctIndex, optionsGrid, feedbackBox, data) {
        const allButtons = optionsGrid.querySelectorAll(".option-btn");

        allButtons.forEach(btn => btn.disabled = true);

        if (selectedIndex === correctIndex) {
            selectedBtn.classList.add("correct");
            currentScore++;
            feedbackBox.innerText = `Correct!`;
        } else {
            selectedBtn.classList.add("wrong");
            allButtons[correctIndex].classList.add("correct");
            feedbackBox.innerText = `Incorrect. The correct answer is ${labels[correctIndex]} ${data.options[correctIndex]}`;
            feedbackBox.style.color = "#991b1b";
            feedbackBox.style.backgroundColor = "#fee2e2";
        }

        feedbackBox.style.display = "block";
    }

    // Function to show the final score when Submit is clicked
    function showFinalScore() {
        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("final-score").innerText = currentScore;
        document.getElementById("final-score-container").style.display = "block";
        
        // Scroll down smoothly to show the final score
        document.getElementById("final-score-container").scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>
